<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de RRHH</title>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#ffffff; --ink:#1f2937; --muted:#667085; --line:#e5e7eb;
      --brand:#f2d33b; --brand2:#c9a900; --dark:#050505; --accent:#0ea5e9; --ok:#12b76a;
      --shadow:0 18px 45px rgba(16,24,40,.12); --shadow2:0 8px 20px rgba(16,24,40,.12);
      --radius:20px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
    .topbar{background:linear-gradient(135deg,#000,#121212);color:var(--brand);padding:18px 28px 22px;text-align:center;box-shadow:var(--shadow2);position:sticky;top:0;z-index:5}
    .topbar h1{margin:0;font-size:clamp(36px,5vw,68px);font-weight:300;letter-spacing:.04em}.topbar small{display:block;color:#d8d8d8;margin-top:4px;letter-spacing:.2em;text-transform:uppercase}
    .app{display:grid;grid-template-columns:330px 1fr;min-height:calc(100vh - 105px)}
    aside{background:#fff;border-right:1px solid var(--line);padding:18px 16px;overflow:auto;max-height:calc(100vh - 105px);position:sticky;top:105px}.side-title{font-size:12px;color:#475467;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin:4px 6px 12px}.tree-group{margin-bottom:6px}.group-head{display:flex;align-items:center;gap:8px;padding:10px 10px;border-radius:12px;cursor:pointer;font-weight:800;color:#344054;background:#f7f7f8}.group-head:hover{background:#eef6ff}.toggle{width:18px;height:18px;border:1px solid #98a2b3;border-radius:4px;display:grid;place-items:center;font-size:12px}.count{margin-left:auto;background:#111827;color:#fff;border-radius:99px;font-size:11px;padding:2px 8px}.people{padding:4px 0 4px 28px}.person{padding:8px 10px;border-radius:10px;cursor:pointer;color:#475467;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid transparent}.person:hover{background:#f2f4f7}.person.active{background:linear-gradient(90deg,rgba(242,211,59,.25),rgba(255,255,255,.9));border-left-color:#111827;color:#111827;font-weight:800}
    main{padding:22px 28px 38px}.toolbar{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 8px 24px rgba(16,24,40,.06);display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:end}.field label{display:block;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#344054;margin-bottom:8px}.searchbox,.select{width:100%;border:1px solid #d0d5dd;border-radius:14px;padding:14px 16px;font-size:15px;outline:none;background:#fff}.searchbox:focus,.select:focus{border-color:var(--brand2);box-shadow:0 0 0 4px rgba(242,211,59,.18)}.btn{border:0;border-radius:14px;padding:14px 16px;background:#111827;color:#fff;font-weight:800;cursor:pointer}.btn:hover{transform:translateY(-1px)}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 20px rgba(16,24,40,.06)}.kpi span{font-size:12px;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.06em}.kpi strong{display:block;font-size:30px;margin-top:7px;color:#111827}.kpi:first-child{border-top:5px solid var(--brand)}
    .content{display:grid;grid-template-columns:minmax(260px,360px) 1fr;gap:24px;align-items:start}.photo-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--line)}.photo-wrap{aspect-ratio:1/1.05;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,#e5e7eb,#fff);display:grid;place-items:center}.photo-wrap img{width:100%;height:100%;object-fit:cover}.avatar{width:132px;height:132px;border-radius:50%;display:grid;place-items:center;background:#111827;color:var(--brand);font-size:42px;font-weight:900;box-shadow:inset 0 0 0 8px rgba(255,255,255,.08)}.status{display:flex;align-items:center;gap:8px;margin-top:14px;color:#344054;font-weight:700}.dot{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 5px rgba(18,183,106,.15)}
    .profile{background:#fff;border:1px solid #98a2b3;border-radius:8px;box-shadow:var(--shadow);padding:26px;min-height:330px}.profile-row{display:flex;align-items:baseline;gap:12px;margin-bottom:24px;flex-wrap:wrap}.profile-row .label{font-size:clamp(22px,2.3vw,34px);font-weight:300;color:#2d2d2d}.profile-row .value{font-size:15px;color:#1f2937;border-bottom:1px solid #2b6b8f;padding-bottom:2px}.profile-row .value a{color:#155e75;text-decoration:none}.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}.chip{border:1px solid var(--line);background:#f9fafb;border-radius:999px;padding:8px 12px;font-size:13px;color:#344054;font-weight:700}
    .analytics{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(16,24,40,.06)}.panel h3{margin:0 0 14px;font-size:16px}.bar-row{display:grid;grid-template-columns:1fr 70px;gap:10px;align-items:center;margin:10px 0}.bar{height:12px;background:#eef2f7;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#111827);border-radius:99px}.table-wrap{overflow:auto}.data-table{width:100%;border-collapse:collapse;font-size:13px}.data-table th,.data-table td{padding:10px;border-bottom:1px solid var(--line);text-align:left}.data-table th{background:#111827;color:#fff;position:sticky;top:0}.data-table tr:hover td{background:#fffbeb}.loading,.error{background:#fff;border:1px dashed #d0d5dd;border-radius:18px;padding:24px;margin-top:18px;color:#667085}.error{border-color:#f04438;color:#b42318;background:#fff5f5}.hide{display:none!important}
    @media(max-width:980px){.app{grid-template-columns:1fr}aside{position:relative;top:0;max-height:330px;border-right:0;border-bottom:1px solid var(--line)}.content,.analytics{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}.topbar{position:relative}.app{min-height:auto}}@media(max-width:560px){main{padding:16px}.kpis{grid-template-columns:1fr}.profile{padding:18px}.profile-row{margin-bottom:18px}.profile-row .label{font-size:24px}}
  </style>
</head>
<body>
  <header class="topbar"><h1>Portal de RRHH</h1><small>Directorio ejecutivo dinámico</small></header>
  <div class="app">
    <aside><div class="side-title">Gerencia</div><div id="tree"></div></aside>
    <main>
      <section class="toolbar">
        <div class="field"><label for="search">Nombre</label><input id="search" class="searchbox" placeholder="Buscar por nombre, puesto, correo o gerencia" /></div>
        <div class="field"><label for="filterGerencia">Filtro</label><select id="filterGerencia" class="select"><option value="">Todas las gerencias</option></select></div>
        <button class="btn" id="clearBtn">Limpiar</button>
      </section>
      <div id="loading" class="loading">Conectando con Google Sheets y construyendo el portal...</div>
      <div id="error" class="error hide"></div>
      <section id="dashboard" class="hide">
        <div class="kpis">
          <div class="kpi"><span>Colaboradores</span><strong id="kpiTotal">0</strong></div>
          <div class="kpi"><span>Gerencias</span><strong id="kpiGerencias">0</strong></div>
          <div class="kpi"><span>Puestos únicos</span><strong id="kpiPuestos">0</strong></div>
          <div class="kpi"><span>Coincidencias</span><strong id="kpiFiltrados">0</strong></div>
        </div>
        <section class="content">
          <article class="photo-card"><div class="photo-wrap" id="photoWrap"></div><div class="status"><i class="dot"></i><span id="selectedHint">Registro seleccionado</span></div></article>
          <article class="profile" id="profile"></article>
        </section>
        <section class="analytics">
          <article class="panel"><h3>Distribución por gerencia</h3><div id="bars"></div></article>
          <article class="panel"><h3>Directorio filtrado</h3><div class="table-wrap"><table class="data-table"><thead><tr><th>Nombre</th><th>Gerencia</th><th>Puesto</th><th>Correo</th></tr></thead><tbody id="tbody"></tbody></table></div></article>
        </section>
      </section>
    </main>
  </div>
<script>
/* ============================================================
   PORTAL RRHH - HTML único
   1) Conexión con Google Sheets mediante fetch().
   2) Procesamiento CSV dinámico sin datos simulados.
   3) Construcción de árbol, perfil, KPIs, gráfico y tabla.
   ============================================================ */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4xgqvsqBzcvYLvayNwM5ZNFvNJrO4vzDxuoXUU5FGOl8inimUGJRaInuR3XdbZyhZ9I8OkU2ysTEQ/pub?gid=1319034942&single=true&output=csv';

const $ = s => document.querySelector(s);
const state = { rows: [], filtered: [], selected: null };

function parseCSV(text){
  const rows=[]; let row=[], cell='', inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"' && inQuotes && n==='"'){ cell+='"'; i++; }
    else if(c==='"'){ inQuotes=!inQuotes; }
    else if(c===',' && !inQuotes){ row.push(cell.trim()); cell=''; }
    else if((c==='\n' || c==='\r') && !inQuotes){ if(cell || row.length){ row.push(cell.trim()); rows.push(row); row=[]; cell=''; } if(c==='\r' && n==='\n') i++; }
    else cell+=c;
  }
  if(cell || row.length){ row.push(cell.trim()); rows.push(row); }
  return rows;
}

function normalizeKey(k){ return (k||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }
function pick(obj, aliases){
  const map = Object.keys(obj).reduce((a,k)=>(a[normalizeKey(k)]=k,a),{});
  for(const a of aliases){ const key = map[normalizeKey(a)]; if(key && obj[key]) return obj[key]; }
  return '';
}
function employeeFrom(raw, idx){
  return {
    id: idx,
    nombre: pick(raw,['nombre','name','colaborador','empleado','nombres','nombre completo']),
    gerencia: pick(raw,['gerencia','departamento','area','unidad','direccion']),
    puesto: pick(raw,['puesto','cargo','posicion','plaza','job title']),
    correo: pick(raw,['correo','email','e-mail','mail','correo electronico']),
    foto: pick(raw,['foto','imagen','photo','url foto','fotografia','image','avatar']),
    raw
  };
}
function driveImage(url){
  if(!url) return '';
  const m = url.match(/(?:id=|\/d\/)([-\w]{20,})/);
  return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : url;
}
function initials(name){ return (name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase(); }
function groupBy(arr,key){ return arr.reduce((a,x)=>{ const k=x[key]||'SIN GERENCIA'; (a[k]??=[]).push(x); return a; },{}); }
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}

async function loadData(){
  try{
    const res = await fetch(SHEET_CSV_URL, { cache:'no-store' });
    if(!res.ok) throw new Error(`Google Sheets respondió con estado ${res.status}`);
    const text = await res.text();
    const matrix = parseCSV(text).filter(r=>r.some(Boolean));
    const headers = matrix.shift() || [];
    state.rows = matrix.map((r,i)=>Object.fromEntries(headers.map((h,j)=>[h,r[j]||'']))).map(employeeFrom).filter(x=>x.nombre || x.gerencia || x.puesto || x.correo);
    if(!state.rows.length) throw new Error('La hoja fue leída, pero no se encontraron registros válidos. Verifica encabezados como NOMBRE, GERENCIA, PUESTO y CORREO.');
    state.filtered = [...state.rows]; state.selected = state.rows[0];
    $('#loading').classList.add('hide'); $('#dashboard').classList.remove('hide');
    buildFilters(); renderAll();
  }catch(err){
    $('#loading').classList.add('hide'); $('#error').classList.remove('hide');
    $('#error').innerHTML = `<b>No fue posible cargar la información.</b><br>${escapeHtml(err.message)}<br><br>Confirma que el Google Sheet esté publicado como CSV y permita acceso público.`;
  }
}
function buildFilters(){
  const gs=[...new Set(state.rows.map(x=>x.gerencia||'SIN GERENCIA'))].sort();
  $('#filterGerencia').innerHTML='<option value="">Todas las gerencias</option>'+gs.map(g=>`<option>${escapeHtml(g)}</option>`).join('');
}
function applyFilters(){
  const q=$('#search').value.toLowerCase().trim(), g=$('#filterGerencia').value;
  state.filtered=state.rows.filter(x=>(!g || (x.gerencia||'SIN GERENCIA')===g) && [x.nombre,x.gerencia,x.puesto,x.correo].join(' ').toLowerCase().includes(q));
  if(!state.filtered.some(x=>x.id===state.selected?.id)) state.selected=state.filtered[0]||state.rows[0];
  renderAll();
}
function renderAll(){ renderTree(); renderKpis(); renderProfile(); renderBars(); renderTable(); }
function renderTree(){
  const groups=groupBy(state.filtered,'gerencia');
  $('#tree').innerHTML=Object.entries(groups).sort().map(([g,items])=>`<div class="tree-group"><div class="group-head"><span class="toggle">−</span><span>${escapeHtml(g)}</span><span class="count">${items.length}</span></div><div class="people">${items.map(p=>`<div class="person ${p.id===state.selected?.id?'active':''}" data-id="${p.id}">${escapeHtml(p.nombre||'Sin nombre')}</div>`).join('')}</div></div>`).join('');
  document.querySelectorAll('.person').forEach(el=>el.onclick=()=>{state.selected=state.rows.find(x=>x.id==el.dataset.id); renderAll();});
  document.querySelectorAll('.group-head').forEach(el=>el.onclick=()=>{ const p=el.nextElementSibling; p.style.display=p.style.display==='none'?'block':'none'; el.querySelector('.toggle').textContent=p.style.display==='none'?'+':'−'; });
}
function renderKpis(){
  $('#kpiTotal').textContent=state.rows.length; $('#kpiGerencias').textContent=new Set(state.rows.map(x=>x.gerencia)).size;
  $('#kpiPuestos').textContent=new Set(state.rows.map(x=>x.puesto).filter(Boolean)).size; $('#kpiFiltrados').textContent=state.filtered.length;
}
function renderProfile(){
  const p=state.selected; if(!p) return;
  const img=driveImage(p.foto);
  $('#photoWrap').innerHTML=img?`<img src="${escapeHtml(img)}" alt="Foto de ${escapeHtml(p.nombre)}" onerror="this.parentElement.innerHTML='<div class=&quot;avatar&quot;>${initials(p.nombre)}</div>'">`:`<div class="avatar">${initials(p.nombre)}</div>`;
  $('#selectedHint').textContent=p.nombre || 'Registro seleccionado';
  $('#profile').innerHTML=`
    <div class="profile-row"><span class="label">Nombre:</span><span class="value">${escapeHtml(p.nombre||'No disponible')}</span></div>
    <div class="profile-row"><span class="label">Gerencia:</span><span class="value">${escapeHtml(p.gerencia||'No disponible')}</span></div>
    <div class="profile-row"><span class="label">Puesto:</span><span class="value">${escapeHtml(p.puesto||'No disponible')}</span></div>
    <div class="profile-row"><span class="label">Correo:</span><span class="value">${p.correo?`<a href="mailto:${escapeHtml(p.correo)}">${escapeHtml(p.correo)}</a>`:'No disponible'}</span></div>
    <div class="chips"><span class="chip">Ficha dinámica</span><span class="chip">Fuente: Google Sheets</span><span class="chip">Actualiza al recargar</span></div>`;
}
function renderBars(){
  const groups=groupBy(state.rows,'gerencia'), max=Math.max(...Object.values(groups).map(x=>x.length));
  $('#bars').innerHTML=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([g,items])=>`<div class="bar-row"><div><b>${escapeHtml(g)}</b><div class="bar"><i style="width:${(items.length/max)*100}%"></i></div></div><strong>${items.length}</strong></div>`).join('');
}
function renderTable(){
  $('#tbody').innerHTML=state.filtered.map(p=>`<tr><td>${escapeHtml(p.nombre)}</td><td>${escapeHtml(p.gerencia)}</td><td>${escapeHtml(p.puesto)}</td><td>${escapeHtml(p.correo)}</td></tr>`).join('');
}
$('#search').addEventListener('input',applyFilters); $('#filterGerencia').addEventListener('change',applyFilters);
$('#clearBtn').onclick=()=>{$('#search').value='';$('#filterGerencia').value='';applyFilters();};
loadData();
</script>
</body>
</html>
